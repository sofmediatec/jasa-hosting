<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body>

<div
class="p-6">

<h1
class="text-3xl font-bold">

Dashboard

</h1>

<div
id="stats"
class="mt-5">

Loading...

</div>

</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>

<script>

loadDashboard();

async function loadDashboard(){

  const data =
    await apiRequest(
      'dashboard'
    );

  document
  .getElementById(
    'stats'
  )
  .innerHTML =

  `<pre>${
    JSON.stringify(
      data.data,
      null,
      2
    )
  }</pre>`;

}

</script>

</body>
</html>
