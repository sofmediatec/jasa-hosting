<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Services</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
rel="stylesheet"
href="../assets/css/app.css">

</head>

<body class="bg-slate-100">

<div class="flex">

  <div id="sidebarContainer"></div>

  <div class="flex-1 flex flex-col">

    <div id="navbarContainer"></div>

    <main class="p-6">

      <div class="flex justify-between items-center mb-6">

        <h1 class="text-3xl font-bold">
          Services
        </h1>

        <button
          onclick="openCreateModal()"
          class="bg-blue-600 text-white px-4 py-2 rounded">

          Tambah Service

        </button>

      </div>

      <div class="bg-white rounded shadow">

        <table class="w-full">

          <thead>

            <tr class="bg-slate-200">

              <th class="p-3 text-left">ID</th>
              <th class="p-3 text-left">Nama</th>
              <th class="p-3 text-left">Slug</th>
              <th class="p-3 text-left">Harga Dasar</th>
              <th class="p-3 text-left">Harga Admin</th>
              <th class="p-3 text-left">Status</th>
              <th class="p-3 text-left">Aksi</th>

            </tr>

          </thead>

          <tbody id="serviceTable">

            <tr>

              <td colspan="7" class="p-4 text-center">

                Loading...

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </main>

    <div id="footerContainer"></div>

  </div>

</div>

<!-- Modal -->

<div
id="serviceModal"
class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">

  <div class="bg-white w-full max-w-lg rounded p-6">

    <h2
    id="modalTitle"
    class="text-xl font-bold mb-4">

      Tambah Service

    </h2>

    <input
      type="hidden"
      id="serviceId">

    <div class="space-y-3">

      <input
      id="name"
      placeholder="Nama Service"
      class="w-full border p-2 rounded">

      <input
      id="slug"
      placeholder="Slug"
      class="w-full border p-2 rounded">

      <textarea
      id="description"
      placeholder="Deskripsi"
      class="w-full border p-2 rounded"></textarea>

      <input
      id="basePrice"
      type="number"
      placeholder="Harga Dasar"
      class="w-full border p-2 rounded">

      <input
      id="adminPrice"
      type="number"
      placeholder="Harga Admin"
      class="w-full border p-2 rounded">

      <select
      id="status"
      class="w-full border p-2 rounded">

        <option value="active">
          Active
        </option>

        <option value="inactive">
          Inactive
        </option>

      </select>

    </div>

    <div class="mt-5 flex gap-2">

      <button
      onclick="saveService()"
      class="bg-green-600 text-white px-4 py-2 rounded">

      Simpan

      </button>

      <button
      onclick="closeModal()"
      class="bg-gray-500 text-white px-4 py-2 rounded">

      Batal

      </button>

    </div>

  </div>

</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/services.js"></script>

<script>

initLayout();

loadServices();

</script>

</body>
</html>
